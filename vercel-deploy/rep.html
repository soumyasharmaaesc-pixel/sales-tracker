function Field({ label, children }) {

}

function MetricCard({ label, value, target, unit, trend, color }) {
  const pct = target ? Math.round((value / target) * 100) : null;
  const good = pct === null || pct >= 80;
  return (
    <div style={{ ...card, padding: "18px 22px", minWidth: 0 }}>
      <div style={{ fontSize: 12, color: C.g, fontWeight: 500, marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.05em" }}>{label}</div>
      <div style={{ display: "flex", alignItems: "baseline", gap: 6 }}>
        <span style={{ fontSize: 26, fontWeight: 700, color: color || C.d }}>{unit === "$" ? `$${value.toLocaleString()}` : value.toLocaleString()}</span>
        {target != null && <span style={{ fontSize: 12, color: C.g }}>/ {unit === "$" ? `$${target.toLocaleString()}` : target}</span>}
      </div>
      {pct !== null && (
        <div style={{ marginTop: 8 }}>
          <div style={{ height: 5, background: "#E5E7EB", borderRadius: 3, overflow: "hidden" }}>
            <div style={{ height: "100%", width: `${Math.min(pct, 100)}%`, background: good ? C.ok : pct >= 50 ? C.warn : C.bad, borderRadius: 3, transition: "width 0.5s" }} />
          </div>
          <div style={{ fontSize: 11, color: good ? C.ok : pct >= 50 ? C.warn : C.bad, marginTop: 3, fontWeight: 600 }}>{pct}%</div>
        </div>
      )}
      {trend && <div style={{ fontSize: 12, color: C.g, marginTop: 4 }}>{trend}</div>}
    </div>
  );
}

// ═══════════════════════════════════════════════════
//  MAIN APP — SHARED STATE + ROLE SWITCHER
// ═══════════════════════════════════════════════════
function App() {
  // ─── ROLE from window._ROLE (set by host HTML page) ───
  const ROLE = (typeof window !== "undefined" && window._ROLE) || "manager";
  const isManager = ROLE === "manager";

  // ─── LOCAL-STORAGE HELPERS ───
  const LS_KEY = "thh_sales_dashboard_v2";
  // Append-only history reservoir. Every state change is snapshotted here
  // (debounced). Nothing is ever deleted from this key except the oldest
  // snapshots if we exceed a hard cap. "Reset Day 1" does NOT touch this key.
  const HISTORY_KEY = "thh_sales_dashboard_history_v1";
  const HISTORY_CAP = 1000;
  const loadLS = () => {
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (!raw) return null;
      return JSON.parse(raw);
    } catch (e) { return null; }
  };
  const loadHistory = () => {
    try {
      const raw = localStorage.getItem(HISTORY_KEY);
      if (!raw) return [];
      const arr = JSON.parse(raw);
      return Array.isArray(arr) ? arr : [];
    } catch (e) { return []; }
  };
  const appendSnapshot = (snapshot) => {
    try {
      const arr = loadHistory();
      arr.push(snapshot);
      if (arr.length > HISTORY_CAP) arr.splice(0, arr.length - HISTORY_CAP);
      localStorage.setItem(HISTORY_KEY, JSON.stringify(arr));
    } catch (e) { /* ignore quota errors */ }
  };
  const initial = loadLS();

  // ─── SHARED STATE (persisted to localStorage) ───
  const [pipeline, setPipeline] = useState((initial && initial.pipeline) || initPipeline);
  const [weeklyReports, setWeeklyReports] = useState((initial && initial.weeklyReports) || initWeeklyReports);
  const [onboarding, setOnboarding] = useState((initial && initial.onboarding) || initOnboarding);
  const [messages, setMessages] = useState((initial && initial.messages) || initMessages);
  const [notes, setNotes] = useState((initial && initial.notes) || initNotes);

  // ─── PERSIST ON CHANGE ───
  const firstRunRef = React.useRef(true);
  React.useEffect(() => {
    try {
      localStorage.setItem(LS_KEY, JSON.stringify({ pipeline, weeklyReports, onboarding, messages, notes }));
    } catch (e) { /* ignore quota errors */ }
    // APPEND-ONLY HISTORY: debounced snapshot so typing bursts collapse
    // into one history entry, but every meaningful change is preserved.
    // The very first run (mount) is NOT snapshotted — that would duplicate
    // whatever was already in localStorage.
    if (firstRunRef.current) { firstRunRef.current = false; return; }
    const t = setTimeout(() => {
      appendSnapshot({
        ts: new Date().toISOString(),
        role: ROLE,
        pipeline, weeklyReports, onboarding, messages, notes,
      });
    }, 800);
    return () => clearTimeout(t);
  }, [pipeline, weeklyReports, onboarding, messages, notes]);

  // ─── CROSS-TAB SYNC via storage events ───
  React.useEffect(() => {
    const handler = (ev) => {
      if (ev.key !== LS_KEY || !ev.newValue) return;
      try {
        const d = JSON.parse(ev.newValue);
        if (d.pipeline) setPipeline(d.pipeline);
        if (d.weeklyReports) setWeeklyReports(d.weeklyReports);
        if (d.onboarding) setOnboarding(d.onboarding);
        if (d.messages) setMessages(d.messages);
        if (d.notes) setNotes(d.notes);
      } catch (e) { /* ignore parse errors */ }
    };
    window.addEventListener("storage", handler);
    return () => window.removeEventListener("storage", handler);
  }, []);

  // ─── RESET TO DAY 1 ───
  const resetAll = () => {
    if (!window.confirm("Reset all data back to Day 1 (Apr 10, 2026)? This will clear pipeline, reports, onboarding progress, messages and notes across BOTH dashboards.")) return;
    setPipeline(initPipeline);
    setWeeklyReports(initWeeklyReports);
    setOnboarding(initOnboarding);
    setMessages(initMessages);
    setNotes(initNotes);
  };

  const nextId = (arr) => Math.max(0, ...arr.map((x) => x.id)) + 1;

  // ─── SHARED COMPUTED ───
  const submitted = weeklyReports.filter((r) => r.submitted);
  const metrics = useMemo(() => {
    const tc = submitted.reduce((s, r) => s + r.calls, 0);
    const te = submitted.reduce((s, r) => s + r.emails, 0);
    const td = submitted.reduce((s, r) => s + r.demosDone, 0);
    const active = pipeline.filter((d) => d.stage !== "Closed" && d.stage !== "Lost");
    const pv = active.reduce((s, d) => s + d.value, 0);
    const cm = pipeline.filter((d) => d.stage === "Closed").reduce((s, d) => s + d.value, 0);
    const won = pipeline.filter((d) => d.stage === "Closed").length;
    return { tc, te, td, active, pv, cm, won, weeks: submitted.length };
  }, [submitted, pipeline]);

  const otherHref = isManager ? "rep.html" : "manager.html";
  const otherLabel = isManager ? "Switch to Rep View" : "Switch to Manager View";
  const barColor = isManager ? C.pri : C.teal;
  const barLabel = isManager ? "MANAGER DASHBOARD" : "REP DASHBOARD";
  const barSub = isManager ? "Full CRUD · You can see everything" : "Focused workspace · Your pipeline, reports, onboarding & messages";

  return (
    <div style={{ fontFamily: "'Inter', -apple-system, BlinkMacSystemFont, sans-serif", background: "#F9FAFB", minHeight: "100vh" }}>

      {/* ─── ROLE HEADER BAR ─── */}
      <div style={{ background: C.d, padding: "12px 32px", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 12, borderBottom: `3px solid ${barColor}` }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14 }}>

          }}>{otherLabel} →</a>

      </div>

      {isManager ? (
        <AdminView
          pipeline={pipeline} setPipeline={setPipeline}
          weeklyReports={weeklyReports} setWeeklyReports={setWeeklyReports}
          onboarding={onboarding} setOnboarding={setOnboarding}
          messages={messages} setMessages={setMessages}
          notes={notes} setNotes={setNotes}
          metrics={metrics} submitted={submitted} nextId={nextId}
        />

        <SalesLeadView
          pipeline={pipeline} setPipeline={setPipeline}
          weeklyReports={weeklyReports} setWeeklyReports={setWeeklyReports}
          onboarding={onboarding} setOnboarding={setOnboarding}
          messages={messages}
          metrics={metrics} submitted={submitted} nextId={nextId}
        />
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════
//  REP VIEW — RESTRICTED
// ═══════════════════════════════════════════════════
function SalesLeadView({ pipeline, setPipeline, weeklyReports, setWeeklyReports, onboarding, setOnboarding, messages, metrics, submitted, nextId }) {
  const [tab, setTab] = useState("home");
  const [reportModal, setReportModal] = useState({ open: false, report: null });
  const [dealModal, setDealModal] = useState({ open: false, deal: null });

  const toggleTask = (weekIdx, taskId) => {
    setOnboarding((ob) => ob.map((w, i) => i === weekIdx ? { ...w, tasks: w.tasks.map((t) => t.id === taskId ? { ...t, done: !t.done } : t) } : w));
  };

  const saveReport = (values) => {
    // Defensive merge: always preserve id/weekLabel/weekStart from the modal's report,
    // then overlay the form values, then mark as submitted.
    const base = reportModal.report || {};
    const merged = { ...base, ...values, submitted: true, submittedAt: new Date().toISOString() };
    setWeeklyReports((a) => a.map((x) => x.id === merged.id ? merged : x));
    setReportModal({ open: false, report: null });
  };

  // Rep DEAL CRUD — every save appends a dated entry to deal.updates[]
  const saveDeal = (d) => {
    if (d.id) {
      setPipeline((p) => p.map((x) => {
        if (x.id !== d.id) return x;
        const entry = buildDealUpdateEntry(x, d, "rep");
        const updates = [...(x.updates || [])];
        if (entry) updates.push(entry);
        return { ...d, updates };
      }));
    } else {
      setPipeline((p) => {
        const id = nextId(p);
        const entry = buildDealUpdateEntry(null, { ...d, id }, "rep");
        return [...p, { ...d, id, updates: [entry] }];
      });
    }
    setDealModal({ open: false, deal: null });
  };

  const pendingReport = weeklyReports.find((r) => !r.submitted);
  const unreadMessages = messages.filter((m) => true).length;
  const obTotal = onboarding.reduce((s, w) => s + w.tasks.length, 0);
  const obDone = onboarding.reduce((s, w) => s + w.tasks.filter((t) => t.done).length, 0);
  const obPct = obTotal ? Math.round((obDone / obTotal) * 100) : 0;

  const tabs = [
    { id: "home", label: "Home" },
    { id: "report", label: pendingReport ? "Submit Report" : "Weekly Reports" },
    { id: "onboarding", label: "My Onboarding" },
    { id: "pipeline", label: "My Pipeline" },
    { id: "messages", label: `Messages (${unreadMessages})` },

              <div style={{ marginTop: 4, fontSize: 14, opacity: 0.85 }}>Week {submitted.length + 1} of onboarding · {obPct}% onboarding complete</div>
            </div>
            {pendingReport && (
              <button onClick={() => setReportModal({ open: true, report: pendingReport })} style={{

                background: "rgba(255,255,255,0.15)", color: C.w, fontWeight: 700, fontSize: 14, cursor: "pointer",

      </div>

      <div style={{ maxWidth: 1200, margin: "0 auto", padding: "24px 32px 48px" }}>

        {/* ─── HOME ─── */}
        {tab === "home" && (<div>

// ─── Weekly Report Form (Rep submits) ───
function WeeklyReportForm({ open, report, onClose, onSave }) {
  const [f, setF] = useState(report || {});
  // CRITICAL: re-sync form state whenever the incoming report changes.
  // Without this, useState keeps the first-mount value ({}) and the form
  // loses id/weekLabel/weekStart, which breaks saveReport's id lookup.
  React.useEffect(() => { setF(report || {}); }, [report]);
  if (!open || !report) return null;
  const n = (label, key) => (
    <Field label={label}><input style={inp} type="number" min="0" value={f[key] || 0} onChange={(e) => setF({ ...f, [key]: parseInt(e.target.value) || 0 })} /></Field>
  );
  return (
    <Modal open={open} onClose={onClose} title={`Submit: ${report.weekLabel}`} width={580}>
      <div style={{ padding: "10px 14px", background: "#F0FDFA", borderRadius: 8, marginBottom: 16, fontSize: 13, color: "#0F766E" }}>

// ═══════════════════════════════════════════════════
//  HISTORY VIEW — append-only data reservoir
// ═══════════════════════════════════════════════════
function HistoryView() {
  const HISTORY_KEY = "thh_sales_dashboard_history_v1";
  const [snapshots, setSnapshots] = React.useState(() => {
    try {
      const raw = localStorage.getItem(HISTORY_KEY);
      const arr = raw ? JSON.parse(raw) : [];
      return Array.isArray(arr) ? arr : [];
    } catch (e) { return []; }
  });
  const [expanded, setExpanded] = React.useState(null);
  const [filter, setFilter] = React.useState("all");

  // Refresh on storage event so new snapshots from other tabs appear live.
  React.useEffect(() => {
    const handler = (ev) => {
      if (ev.key !== HISTORY_KEY || !ev.newValue) return;
      try {
        const arr = JSON.parse(ev.newValue);
        if (Array.isArray(arr)) setSnapshots(arr);
      } catch (e) {}
    };
    window.addEventListener("storage", handler);
    return () => window.removeEventListener("storage", handler);
  }, []);

  // Refresh snapshots when returning to the tab — catches same-tab appends.
  React.useEffect(() => {
    const tick = setInterval(() => {
      try {
        const raw = localStorage.getItem(HISTORY_KEY);
        const arr = raw ? JSON.parse(raw) : [];
        if (Array.isArray(arr) && arr.length !== snapshots.length) setSnapshots(arr);
      } catch (e) {}
    }, 1500);
    return () => clearInterval(tick);
  }, [snapshots.length]);

  const filtered = filter === "all" ? snapshots : snapshots.filter((s) => s.role === filter);
  const fmt = (ts) => { try { return new Date(ts).toLocaleString(); } catch (e) { return ts; } };

  const download = () => {
    const blob = new Blob([JSON.stringify(snapshots, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `sales-dashboard-history-${new Date().toISOString().slice(0, 10)}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const restore = (snap) => {
    if (!window.confirm(`Restore the live dashboard to the snapshot taken at ${fmt(snap.ts)}?\n\nThis will overwrite the current live data. The history itself will NOT be erased — this restore will also be logged as a new entry.`)) return;
    const live = {
      pipeline: snap.pipeline,
      weeklyReports: snap.weeklyReports,
      onboarding: snap.onboarding,
      messages: snap.messages,
      notes: snap.notes,
    };
    try {
      localStorage.setItem("thh_sales_dashboard_v2", JSON.stringify(live));
      window.location.reload();
    } catch (e) { window.alert("Could not restore: " + e.message); }
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20, flexWrap: "wrap", gap: 12 }}>
        <div>
          <h2 style={{ margin: 0, fontSize: 20, color: C.d }}>Data History Reservoir</h2>
          <p style={{ margin: "4px 0 0", fontSize: 14, color: C.g }}>
            Append-only log of every change. Nothing here is ever erased by "Reset Day 1" — past data is always recoverable.
          </p>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <select value={filter} onChange={(e) => setFilter(e.target.value)} style={sel}>
            <option value="all">All sources</option>
            <option value="manager">Manager edits</option>
            <option value="rep">Rep edits</option>
          </select>
          <button onClick={download} style={btnS(C.pri, true)} disabled={snapshots.length === 0}>
            Download JSON ({snapshots.length})
          </button>
        </div>
      </div>

      {snapshots.length === 0 && (
        <div style={{ ...card, padding: 40, textAlign: "center", color: C.g }}>
          No history snapshots yet. Every edit made by Rep or Manager from now on will be preserved here.
        </div>
      )}

      {filtered.length > 0 && (
        <div style={{ ...card, padding: 0, overflow: "hidden" }}>
          <div style={{ maxHeight: "65vh", overflowY: "auto" }}>
            {[...filtered].reverse().map((snap, idx) => {
              const realIdx = filtered.length - 1 - idx;
              const isOpen = expanded === realIdx;
              const submittedReports = (snap.weeklyReports || []).filter((r) => r.submitted).length;
              const wonDeals = (snap.pipeline || []).filter((d) => d.stage === "Closed").length;
              return (
                <div key={realIdx} style={{ borderBottom: "1px solid #E5E7EB" }}>
                  <div
                    onClick={() => setExpanded(isOpen ? null : realIdx)}
                    style={{ padding: "14px 20px", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", background: isOpen ? "#F9FAFB" : C.w }}
                  >
                    <div style={{ display: "flex", gap: 14, alignItems: "center", flexWrap: "wrap" }}>
                      <span style={{ fontSize: 13, fontWeight: 600, color: C.d, minWidth: 170 }}>{fmt(snap.ts)}</span>
                      <span style={{ fontSize: 11, fontWeight: 700, padding: "3px 10px", borderRadius: 6, background: snap.role === "manager" ? "#EEF2FF" : "#F0FDFA", color: snap.role === "manager" ? "#3730A3" : "#0F766E", textTransform: "uppercase", letterSpacing: "0.05em" }}>{snap.role || "unknown"}</span>
                      <span style={{ fontSize: 12, color: C.g }}>
                        {(snap.pipeline || []).length} deals · {submittedReports} reports · {wonDeals} won · {(snap.notes || []).length} notes
                      </span>
                    </div>
                    <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                      <button
                        onClick={(e) => { e.stopPropagation(); restore(snap); }}
                        style={{ ...btnS(C.warn, false), padding: "5px 12px", fontSize: 12 }}
                      >Restore</button>
                      <span style={{ color: C.g, fontSize: 18, transform: isOpen ? "rotate(90deg)" : "none", transition: "transform 0.2s" }}>›</span>
                    </div>
                  </div>
                  {isOpen && (
                    <div style={{ padding: "0 20px 16px", background: "#F9FAFB" }}>
                      <pre style={{ margin: 0, padding: 14, background: "#0F172A", color: "#E5E7EB", borderRadius: 8, fontSize: 11, lineHeight: 1.5, overflowX: "auto", maxHeight: 300 }}>
                        {JSON.stringify({
                          pipeline: snap.pipeline,
                          weeklyReports: snap.weeklyReports,
                          messages: snap.messages,
                          notes: snap.notes,
                        }, null, 2)}
                      </pre>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}


// ═══════════════════════════════════════════════════
//  BENCHMARK UPLOADER — Manager uploads xlsx/csv/docx.
//  Every upload is kept (append-only); the built-in
//  GTM benchmarks section below is NEVER removed.
// ═══════════════════════════════════════════════════
const BENCHMARKS_KEY = "thh_sales_dashboard_benchmarks_v1";

function loadBenchmarks() {
  try {
    const raw = localStorage.getItem(BENCHMARKS_KEY);
    if (!raw) return [];
    const arr = JSON.parse(raw);
    return Array.isArray(arr) ? arr : [];
  } catch (e) { return []; }
}

function saveBenchmarksLS(arr) {
  try { localStorage.setItem(BENCHMARKS_KEY, JSON.stringify(arr)); } catch (e) {}
}

function parseWorkbookRows(workbook) {
  const result = { weekly: [], daily: [], sheets: {} };
  workbook.SheetNames.forEach((name) => {
    const ws = workbook.Sheets[name];
    const rows = window.XLSX.utils.sheet_to_json(ws, { defval: null, raw: true });
    result.sheets[name] = rows;
  });
  const weeklyName = workbook.SheetNames.find((n) => /weekly/i.test(n)) || workbook.SheetNames[0];
  const dailyName = workbook.SheetNames.find((n) => /daily/i.test(n));
  const get = (r, needle) => {
    const keys = Object.keys(r);
    const k = keys.find((x) => x.toLowerCase().replace(/[^a-z0-9]/g, "").includes(needle));
    return k ? r[k] : null;
  };
  const num = (v) => { const n = Number(v); return isNaN(n) ? 0 : n; };
  if (weeklyName && result.sheets[weeklyName]) {
    result.weekly = result.sheets[weeklyName]
      .filter((r) => r && Object.values(r).some((v) => v !== null && v !== ""))
      .map((r) => ({
        week: get(r, "week") || null,
        label: String(get(r, "label") || get(r, "weeklabel") || "") || `Week ${get(r, "week") || ""}`,
        calls: num(get(r, "calls")),
        emails: num(get(r, "emails")),
        linkedin: num(get(r, "linkedin")),
        demosBooked: num(get(r, "demosbooked")),
        demosDone: num(get(r, "demosdone")),
        proposals: num(get(r, "proposals")),
        closed: num(get(r, "dealsclosed")) || num(get(r, "closed")),
        mrr: num(get(r, "mrr")),
        pipeline: num(get(r, "pipelinevalue")),
        notes: String(get(r, "notes") || ""),
      }))
      .filter((r) => r.label || r.week || r.calls || r.emails);
  }
  if (dailyName && result.sheets[dailyName]) {
    result.daily = result.sheets[dailyName]
      .filter((r) => r && Object.values(r).some((v) => v !== null && v !== ""))
      .map((r) => ({
        day: get(r, "day") || null,
        date: String(get(r, "date") || ""),
        calls: num(get(r, "calls")),
        emails: num(get(r, "emails")),
        linkedin: num(get(r, "linkedin")),
        demosBooked: num(get(r, "demosbooked")),
        demosDone: num(get(r, "demosdone")),
        notes: String(get(r, "notes") || ""),
      }))
      .filter((r) => r.date || r.day);
  }
  return result;
}

function BenchmarkUploader() {
  const [benchmarks, setBenchmarks] = React.useState(() => loadBenchmarks());
  const [status, setStatus] = React.useState(null);
  const fileInputRef = React.useRef(null);

  const handleFile = async (file) => {
    if (!file) return;
    const name = file.name;
    const ext = (name.split(".").pop() || "").toLowerCase();
    setStatus({ type: "loading", text: `Parsing ${name}…` });
    try {
      let entry = {
        id: Date.now(),
        uploadedAt: new Date().toISOString(),
        name,
        source: ext,
        weekly: [],
        daily: [],
        text: "",
      };
      if (ext === "xlsx" || ext === "xls" || ext === "csv") {
        if (typeof window.XLSX === "undefined") throw new Error("SheetJS not loaded yet — try again in a moment.");
        const buf = await file.arrayBuffer();
        const wb = window.XLSX.read(buf, { type: "array", cellDates: true });
        const parsed = parseWorkbookRows(wb);
        entry = { ...entry, weekly: parsed.weekly, daily: parsed.daily };
      } else if (ext === "docx") {
        if (typeof window.mammoth === "undefined") throw new Error("mammoth not loaded yet — try again in a moment.");
        const buf = await file.arrayBuffer();
        const res = await window.mammoth.extractRawText({ arrayBuffer: buf });
        entry.text = res.value || "";
      } else {
        throw new Error(`Unsupported file type: .${ext}. Please use .xlsx, .xls, .csv, or .docx.`);
      }
      const next = [...loadBenchmarks(), entry];
      saveBenchmarksLS(next);
      setBenchmarks(next);
      if (ext === "docx") {
        setStatus({ type: "ok", text: `Uploaded ${name} · ${entry.text.length} chars extracted` });
      } else {
        setStatus({ type: "ok", text: `Uploaded ${name} · ${entry.weekly.length} weekly rows · ${entry.daily.length} daily rows` });
      }
    } catch (e) {
      setStatus({ type: "err", text: `Error: ${e.message}` });
    }
  };

  const removeBenchmark = (id) => {
    if (!window.confirm("Remove this uploaded benchmark? (The built-in GTM benchmarks below are unaffected, and your Data History reservoir keeps the full change log.)")) return;
    const next = loadBenchmarks().filter((b) => b.id !== id);
    saveBenchmarksLS(next);
    setBenchmarks(next);
  };

  return (
    <div style={{ ...card, padding: 24, marginBottom: 24, borderLeft: `5px solid ${C.pri}` }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 12, marginBottom: 14 }}>
        <div>
          <h3 style={{ margin: "0 0 4px", fontSize: 16, color: C.d }}>Custom Benchmark Uploads</h3>
          <p style={{ margin: 0, fontSize: 13, color: C.g, maxWidth: 640, lineHeight: 1.5 }}>
            Upload a sales rep's benchmark file (Excel, CSV, or Word). Every upload is preserved — the built-in FY27 GTM benchmarks below are <strong>never removed</strong>. The latest upload is treated as the active target.
          </p>
        </div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          <a href="sales-tracker-benchmark-template.xlsx" download style={{
            padding: "10px 18px", borderRadius: 8, background: "#EEF2FF", color: C.pri,
            fontWeight: 700, fontSize: 13, textDecoration: "none", border: `1.5px solid ${C.pri}`,
            display: "inline-flex", alignItems: "center", gap: 6,
          }}>↓ Download Template (.xlsx)</a>
          <button onClick={() => fileInputRef.current && fileInputRef.current.click()} style={{
            padding: "10px 18px", borderRadius: 8, border: "none", cursor: "pointer",
            background: C.pri, color: C.w, fontWeight: 700, fontSize: 13,
          }}>↑ Upload Benchmark</button>
          <input
            ref={fileInputRef}
            type="file"
            accept=".xlsx,.xls,.csv,.docx"
            style={{ display: "none" }}
            onChange={(e) => { const f = e.target.files && e.target.files[0]; if (f) handleFile(f); e.target.value = ""; }}
          />
        </div>
      </div>

      {status && (
        <div style={{
          padding: "10px 14px", borderRadius: 8, marginBottom: 12, fontSize: 13,
          background: status.type === "ok" ? "#D1FAE5" : status.type === "err" ? "#FEE2E2" : "#EEF2FF",
          color: status.type === "ok" ? "#065F46" : status.type === "err" ? "#991B1B" : "#3730A3",
          border: `1px solid ${status.type === "ok" ? "#6EE7B7" : status.type === "err" ? "#FCA5A5" : "#C7D2FE"}`,
        }}>{status.text}</div>
      )}

      {benchmarks.length === 0 ? (
        <div style={{ padding: 20, background: "#F9FAFB", borderRadius: 8, textAlign: "center", color: C.g, fontSize: 13 }}>
          No custom benchmarks uploaded yet. Download the template above, fill in your targets, and upload it here.
        </div>
      ) : (
        <div>
          <div style={{ fontSize: 11, color: C.g, marginBottom: 8, textTransform: "uppercase", letterSpacing: "0.05em", fontWeight: 700 }}>
            Uploaded Benchmarks ({benchmarks.length}) · Latest is the active target
          </div>
          {[...benchmarks].reverse().map((b, idx) => {
            const isLatest = idx === 0;
            return (
              <div key={b.id} style={{
                padding: 14, marginBottom: 10, borderRadius: 8,
                border: isLatest ? `2px solid ${C.ok}` : "1px solid #E5E7EB",
                background: isLatest ? "#F0FDF4" : "#F9FAFB",
              }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6, flexWrap: "wrap", gap: 8 }}>
                  <div>
                    <span style={{ fontWeight: 700, fontSize: 14, color: C.d }}>{b.name}</span>
                    {isLatest && <span style={{ marginLeft: 8, fontSize: 10, background: C.ok, color: C.w, padding: "2px 8px", borderRadius: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.05em" }}>Active</span>}
                    <span style={{ marginLeft: 8, fontSize: 11, color: C.g }}>uploaded {new Date(b.uploadedAt).toLocaleString()}</span>
                  </div>
                  <button onClick={() => removeBenchmark(b.id)} style={{ padding: "5px 12px", border: "1px solid #FCA5A5", background: C.w, color: C.bad, borderRadius: 6, fontSize: 11, cursor: "pointer", fontWeight: 600 }}>Remove</button>
                </div>
                <div style={{ fontSize: 12, color: C.g, marginBottom: 8 }}>
                  {b.source === "docx"
                    ? <span>DOCX · {b.text.length} chars extracted</span>
                    : <span>{b.source.toUpperCase()} · {b.weekly.length} weekly rows · {b.daily.length} daily rows</span>}
                </div>
                {b.weekly && b.weekly.length > 0 && (
                  <div style={{ overflowX: "auto", background: C.w, borderRadius: 6, border: "1px solid #E5E7EB" }}>
                    <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11 }}>
                      <thead>
                        <tr style={{ background: "#F3F4F6" }}>
                          {["Week", "Calls", "Emails", "LinkedIn", "Demos", "Props", "Deals", "MRR"].map((h) => (
                            <th key={h} style={{ padding: "6px 8px", textAlign: "left", color: C.g, fontWeight: 700, borderBottom: "1px solid #E5E7EB" }}>{h}</th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {b.weekly.slice(0, 6).map((w, i) => (
                          <tr key={i} style={{ borderBottom: "1px solid #F9FAFB" }}>
                            <td style={{ padding: "5px 8px", fontWeight: 600, color: C.d }}>{w.label || `W${w.week}`}</td>
                            <td style={{ padding: "5px 8px" }}>{w.calls || "—"}</td>
                            <td style={{ padding: "5px 8px" }}>{w.emails || "—"}</td>
                            <td style={{ padding: "5px 8px" }}>{w.linkedin || "—"}</td>
                            <td style={{ padding: "5px 8px" }}>{w.demosDone || "—"}</td>
                            <td style={{ padding: "5px 8px" }}>{w.proposals || "—"}</td>
                            <td style={{ padding: "5px 8px" }}>{w.closed || "—"}</td>
                            <td style={{ padding: "5px 8px", color: C.ok, fontWeight: 600 }}>{w.mrr ? `$${w.mrr.toLocaleString()}` : "—"}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                    {b.weekly.length > 6 && <div style={{ padding: "5px 8px", fontSize: 11, color: C.g, fontStyle: "italic" }}>… and {b.weekly.length - 6} more rows</div>}
                  </div>
                )}
                {b.source === "docx" && b.text && (
                  <div style={{ padding: 10, background: C.w, borderRadius: 6, border: "1px solid #E5E7EB", fontSize: 12, color: C.d, maxHeight: 160, overflowY: "auto", whiteSpace: "pre-wrap", lineHeight: 1.5 }}>
                    {b.text.slice(0, 1200)}{b.text.length > 1200 ? "…" : ""}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}


// ═══════════════════════════════════════════════════
//  DEAL ACTIVITY LOG HELPER — builds dated entries
//  for the deal.updates[] array. Both Manager and Rep
//  saveDeal() funnel through this so every change is
//  timestamped and attributed.
// ═══════════════════════════════════════════════════
function buildDealUpdateEntry(prev, next, role) {
  const today = new Date().toISOString().slice(0, 10);
  const by = role === "manager" ? "Manager" : "Rep";
  if (!prev) {
    return {
      date: today,
      by,
      action: "created",
      changes: [`Lead created · ${next.company} · ${next.stage} · $${next.value}/mo`],
    };
  }
  const fields = [
    ["company", "Company"],
    ["segment", "Segment"],
    ["stage", "Stage"],
    ["value", "MRR"],
    ["geo", "Geo"],
    ["daysInStage", "Days in stage"],
    ["nextStep", "Next step"],
  ];
  const changes = [];
  fields.forEach(([k, label]) => {
    const a = prev[k];
    const b = next[k];
    if ((a || "") !== (b || "")) {
      changes.push(`${label}: ${a === 0 || a ? a : "—"} → ${b === 0 || b ? b : "—"}`);
    }
  });
  if (changes.length === 0) return null;
  return { date: today, by, action: "updated", changes };
}


// ═══════════════════════════════════════════════════
//  DEAL TIMELINE — expandable list of dated updates
//  rendered inline in both pipeline views.
// ═══════════════════════════════════════════════════
function DealTimeline({ deal }) {
  const [open, setOpen] = React.useState(false);
  const updates = deal.updates || [];
  if (updates.length === 0) {
    return (
      <span style={{ fontSize: 11, color: C.g, fontStyle: "italic" }}>No activity logged</span>
    );
  }
  return (
    <div>
      <button onClick={() => setOpen(!open)} style={{
        padding: "3px 10px", border: "1px solid #E5E7EB", background: C.w,
        color: C.pri, borderRadius: 6, fontSize: 11, cursor: "pointer", fontWeight: 600,
      }}>
        {open ? "▾" : "▸"} {updates.length} update{updates.length === 1 ? "" : "s"}
      </button>
      {open && (
        <div style={{ marginTop: 8, paddingLeft: 10, borderLeft: `2px solid ${C.pri}` }}>
          {[...updates].reverse().map((u, i) => (
            <div key={i} style={{ marginBottom: 8, fontSize: 12 }}>
              <div style={{ fontWeight: 700, color: C.d }}>
                <span style={{ color: C.pri }}>{u.date}</span>
                <span style={{ color: C.g, marginLeft: 6, fontWeight: 500 }}>· {u.by} · {u.action}</span>
              </div>
              <ul style={{ margin: "4px 0 0 16px", padding: 0, color: C.g, lineHeight: 1.5 }}>
                {(u.changes || []).map((c, j) => <li key={j}>{c}</li>)}
              </ul>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function AdminView({ pipeline, setPipeline, weeklyReports, setWeeklyReports, onboarding, setOnboarding, messages, setMessages, notes, setNotes, metrics, submitted, nextId }) {
  const [tab, setTab] = useState("overview");
  const [dealModal, setDealModal] = useState({ open: false, deal: null });

                      {n.type === "positive" ? "POSITIVE" : n.type === "action" ? "ACTION NEEDED" : "FLAG"}
                    </span>
                    <span style={{ fontSize: 13, color: C.g }}>{n.date}</span>
                  </div>
                  <div style={{ fontSize: 15, color: C.d, lineHeight: 1.5 }}>{n.text}</div>
                </div>
                <div style={{ display: "flex", gap: 6, flexShrink: 0, marginLeft: 16 }}>
                  <button onClick={() => setNoteModal({ open: true, note: n })} style={btnS(C.pri, false)}>Edit</button>
                  <button onClick={() => setConfirmDel({ open: true, type: "note", id: n.id })} style={btnS(C.bad, false)}>Del</button>
                </div>
              </div>
            </div>
          ))}
        </div>)}

        <div style={{ marginTop: 40, paddingTop: 16, borderTop: "1px solid #E5E7EB", textAlign: "center", fontSize: 12, color: C.g }}>
          TheHireHub.AI · Command Center · Manager view — Rep cannot see private notes
        </div>
      </div>

      {/* ── MODALS ── */}
      <DealForm open={dealModal.open} deal={dealModal.deal} onClose={() => setDealModal({ open: false, deal: null })} onSave={saveDeal} />
      <MsgForm open={msgModal.open} msg={msgModal.msg} onClose={() => setMsgModal({ open: false, msg: null })} onSave={saveMsg} />
      <NoteForm open={noteModal.open} note={noteModal.note} onClose={() => setNoteModal({ open: false, note: null })} onSave={saveNote} />
      <TaskForm open={taskModal.open} weekIdx={taskModal.weekIdx} weeks={onboarding} onClose={() => setTaskModal({ open: false, weekIdx: null })} onSave={addTask} />
      <ReportAdminForm open={reportModal.open} report={reportModal.report} onClose={() => setReportModal({ open: false, report: null })} onSave={saveReportAdmin} />
      <Modal open={confirmDel.open} onClose={() => setConfirmDel({ open: false })} title="Confirm Delete" width={400}>
        <p style={{ margin: "0 0 20px", fontSize: 15, color: C.d }}>
          {confirmDel.type === "report"
            ? <>Remove the weekly report <strong>{confirmDel.extra}</strong>? This can't be undone (but the Data History reservoir keeps an append-only log).</>
            : <>Delete this? Can't be undone.</>}
        </p>
        <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
          <button onClick={() => setConfirmDel({ open: false })} style={btnS(C.g, false)}>Cancel</button>
          <button onClick={() => {
            if (confirmDel.type === "deal") deleteDeal(confirmDel.id);
            else if (confirmDel.type === "msg") deleteMsg(confirmDel.id);
            else if (confirmDel.type === "note") deleteNote(confirmDel.id);
            else if (confirmDel.type === "report") deleteReport(confirmDel.id);
          }} style={btnS(C.bad, true)}>Delete</button>
        </div>
      </Modal>
    </div>
  );
}

// ─── FORM MODALS ───
function DealForm({ open, deal, onClose, onSave }) {
  const DEFAULT_DEAL = { company: "", segment: "SMB", stage: "Lead", value: 0, geo: "India", daysInStage: 0, nextStep: "", startDate: new Date().toISOString().slice(0, 10) };
  const [f, setF] = useState(deal || DEFAULT_DEAL);
  React.useEffect(() => { setF(deal || DEFAULT_DEAL); }, [deal]);
  if (!open) return null;
  return (
    <Modal open={open} onClose={onClose} title={deal ? "Edit Deal" : "Add Deal"}>
      <Field label="Company"><input style={inp} value={f.company} onChange={(e) => setF({ ...f, company: e.target.value })} placeholder="Company name" /></Field>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
        <Field label="Segment"><select style={sel} value={f.segment} onChange={(e) => setF({ ...f, segment: e.target.value })}>{SEGMENTS.map((s) => <option key={s}>{s}</option>)}</select></Field>
        <Field label="Geo"><select style={sel} value={f.geo} onChange={(e) => setF({ ...f, geo: e.target.value })}>{GEOS.map((g) => <option key={g}>{g}</option>)}</select></Field>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
        <Field label="Stage"><select style={sel} value={f.stage} onChange={(e) => setF({ ...f, stage: e.target.value })}>{STAGES.map((s) => <option key={s}>{s}</option>)}</select></Field>
        <Field label="MRR ($)"><input style={inp} type="number" value={f.value} onChange={(e) => setF({ ...f, value: parseInt(e.target.value) || 0 })} /></Field>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
        <Field label="Days in Stage"><input style={inp} type="number" value={f.daysInStage} onChange={(e) => setF({ ...f, daysInStage: parseInt(e.target.value) || 0 })} /></Field>
        <Field label="Start Date"><input style={inp} type="date" value={f.startDate} onChange={(e) => setF({ ...f, startDate: e.target.value })} /></Field>
      </div>
      <Field label="Next Step"><input style={inp} value={f.nextStep} onChange={(e) => setF({ ...f, nextStep: e.target.value })} /></Field>
      <div style={{ display: "flex", gap: 10, justifyContent: "flex-end", marginTop: 8 }}>
        <button onClick={onClose} style={btnS(C.g, false)}>Cancel</button>
        <button onClick={() => onSave(f)} style={btnS(C.pri, true)} disabled={!f.company}>{deal ? "Save" : "Add Deal"}</button>
      </div>
    </Modal>
  );
}

function MsgForm({ open, msg, onClose, onSave }) {
  const DEFAULT_MSG = { date: new Date().toISOString().slice(0, 10), text: "", type: "target" };
  const [f, setF] = useState(msg || DEFAULT_MSG);
  React.useEffect(() => { setF(msg || DEFAULT_MSG); }, [msg]);
  if (!open) return null;
  const types = [{ value: "kudos", label: "Kudos", c: C.ok }, { value: "action", label: "Action Required", c: C.warn }, { value: "target", label: "Target / Direction", c: C.pri }];
  return (
    <Modal open={open} onClose={onClose} title={msg ? "Edit Message" : "Send Message to Rep"} width={500}>
      <div style={{ padding: "8px 12px", background: "#EEF2FF", borderRadius: 8, marginBottom: 16, fontSize: 13, color: "#3730A3" }}>Rep will see this on their dashboard immediately.</div>
      <Field label="Date"><input style={inp} type="date" value={f.date} onChange={(e) => setF({ ...f, date: e.target.value })} /></Field>
      <Field label="Type">
        <div style={{ display: "flex", gap: 8 }}>{types.map((t) => <button key={t.value} onClick={() => setF({ ...f, type: t.value })} style={{ ...btnS(t.c, f.type === t.value), flex: 1, justifyContent: "center" }}>{t.label}</button>)}</div>
      </Field>
      <Field label="Message"><textarea style={{ ...inp, height: 90, resize: "vertical" }} value={f.text} onChange={(e) => setF({ ...f, text: e.target.value })} placeholder="Your message to Rep..." /></Field>
      <div style={{ display: "flex", gap: 10, justifyContent: "flex-end", marginTop: 8 }}>
        <button onClick={onClose} style={btnS(C.g, false)}>Cancel</button>
        <button onClick={() => onSave(f)} style={btnS(C.pri, true)} disabled={!f.text}>{msg ? "Save" : "Send"}</button>
      </div>
    </Modal>
  );
}

function NoteForm({ open, note, onClose, onSave }) {
  const DEFAULT_NOTE = { date: new Date().toISOString().slice(0, 10), text: "", type: "flag" };
  const [f, setF] = useState(note || DEFAULT_NOTE);
  React.useEffect(() => { setF(note || DEFAULT_NOTE); }, [note]);
  if (!open) return null;
  const types = [{ value: "positive", label: "Positive", c: C.ok }, { value: "flag", label: "Flag", c: C.bad }, { value: "action", label: "Action Needed", c: C.warn }];
  return (
    <Modal open={open} onClose={onClose} title={note ? "Edit Note" : "Add Private Note"} width={480}>
      <Field label="Date"><input style={inp} type="date" value={f.date} onChange={(e) => setF({ ...f, date: e.target.value })} /></Field>
      <Field label="Type"><div style={{ display: "flex", gap: 8 }}>{types.map((t) => <button key={t.value} onClick={() => setF({ ...f, type: t.value })} style={{ ...btnS(t.c, f.type === t.value), flex: 1, justifyContent: "center" }}>{t.label}</button>)}</div></Field>
      <Field label="Note"><textarea style={{ ...inp, height: 90, resize: "vertical" }} value={f.text} onChange={(e) => setF({ ...f, text: e.target.value })} placeholder="Your private observation..." /></Field>
      <div style={{ display: "flex", gap: 10, justifyContent: "flex-end", marginTop: 8 }}>
        <button onClick={onClose} style={btnS(C.g, false)}>Cancel</button>
        <button onClick={() => onSave(f)} style={btnS(C.pri, true)} disabled={!f.text}>{note ? "Save" : "Add"}</button>
      </div>
    </Modal>
  );
}

// ─── Weekly Report Admin Form ─── (Manager can add or edit any report,
// including the week label and week-start date, unlike the Rep form.)
function ReportAdminForm({ open, report, onClose, onSave }) {
  const DEFAULT_REPORT = {
    weekLabel: "", weekStart: new Date().toISOString().slice(0, 10),
    calls: 0, emails: 0, linkedin: 0,
    demosBooked: 0, demosDone: 0, proposals: 0, closed: 0,
    topWin: "", blockers: "", plan: "", submitted: true,
  };
  const [f, setF] = useState(report || DEFAULT_REPORT);
  React.useEffect(() => { setF(report || DEFAULT_REPORT); }, [report]);
  if (!open || !report) return null;
  const n = (label, key) => (
    <Field label={label}><input style={inp} type="number" min="0" value={f[key] || 0} onChange={(e) => setF({ ...f, [key]: parseInt(e.target.value) || 0 })} /></Field>
  );
  const isNew = !report.id;
  return (
    <Modal open={open} onClose={onClose} title={isNew ? "Add Weekly Report" : `Edit: ${report.weekLabel}`} width={600}>
      <div style={{ padding: "10px 14px", background: "#EEF2FF", borderRadius: 8, marginBottom: 16, fontSize: 13, color: "#3730A3" }}>
        {isNew
          ? "Manually create a weekly report. This change is preserved in the Data History reservoir."
          : "Edit any field. The Rep will see the updated values the next time they open their dashboard."}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 12 }}>
        <Field label="Week Label"><input style={inp} value={f.weekLabel || ""} onChange={(e) => setF({ ...f, weekLabel: e.target.value })} placeholder="e.g. Week 1 (Apr 10–14)" /></Field>
        <Field label="Week Start Date"><input style={inp} type="date" value={f.weekStart || ""} onChange={(e) => setF({ ...f, weekStart: e.target.value })} /></Field>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 10 }}>
        {n("Calls", "calls")}{n("Emails", "emails")}{n("LinkedIn", "linkedin")}{n("Demos Booked", "demosBooked")}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
        {n("Demos Done", "demosDone")}{n("Proposals", "proposals")}{n("Deals Closed", "closed")}
      </div>
      <Field label="Top Win"><input style={inp} value={f.topWin || ""} onChange={(e) => setF({ ...f, topWin: e.target.value })} placeholder="Biggest accomplishment this week" /></Field>
      <Field label="Blockers / Challenges"><textarea style={{ ...inp, height: 60, resize: "vertical" }} value={f.blockers || ""} onChange={(e) => setF({ ...f, blockers: e.target.value })} placeholder="What's slowing the Rep down?" /></Field>
      <Field label="Next Week Plan"><textarea style={{ ...inp, height: 60, resize: "vertical" }} value={f.plan || ""} onChange={(e) => setF({ ...f, plan: e.target.value })} placeholder="Priorities for next week" /></Field>
      <div style={{ display: "flex", gap: 10, justifyContent: "flex-end", marginTop: 8 }}>
        <button onClick={onClose} style={btnS(C.g, false)}>Cancel</button>
        <button onClick={() => onSave(f)} style={btnS(C.pri, true)} disabled={!f.weekLabel}>{isNew ? "Add Report" : "Save"}</button>
      </div>
    </Modal>
  );
}

function TaskForm({ open, weekIdx, weeks, onClose, onSave }) {
  const [text, setText] = useState("");
  if (!open || weekIdx === null) return null;
  return (
    <Modal open={open} onClose={onClose} title={`Add Task — Week ${weeks[weekIdx].week}`} width={440}>
      <div style={{ padding: "8px 12px", background: "#EEF2FF", borderRadius: 8, marginBottom: 16, fontSize: 13, color: "#3730A3" }}>This task will appear on Rep's onboarding view immediately.</div>
      <Field label="Task"><input style={inp} value={text} onChange={(e) => setText(e.target.value)} placeholder="e.g. Complete competitive analysis doc" autoFocus /></Field>
      <div style={{ display: "flex", gap: 10, justifyContent: "flex-end", marginTop: 8 }}>
        <button onClick={onClose} style={btnS(C.g, false)}>Cancel</button>
        <button onClick={() => { if (text.trim()) { onSave(weekIdx, text.trim()); setText(""); } }} style={btnS(C.pri, true)} disabled={!text.trim()}>Add Task</button>
      </div>
    </Modal>
  );
}

  </script>
